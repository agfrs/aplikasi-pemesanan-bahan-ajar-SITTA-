<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SITTA – Tracking Pengiriman</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<main class="page">

  <div class="page-header fade-in-up">
    <h1>🚚 Tracking Pengiriman</h1>
    <p>Lacak status pengiriman Delivery Order bahan ajar Anda</p>
  </div>

  <!-- Search Card -->
  <div class="card fade-in-up delay-1" style="max-width:600px;margin-bottom:28px">
    <div class="card-body">
      <p style="font-size:14px;color:var(--text-2);margin-bottom:16px">
        Masukkan Nomor Delivery Order (DO) untuk melihat status pengiriman.
        <br><small style="color:var(--text-3)">Contoh: <strong>2023001234</strong> atau <strong>2023005678</strong></small>
      </p>
      <div style="display:flex;gap:10px;align-items:flex-end">
        <div class="form-group" style="flex:1;margin-bottom:0">
          <label for="noDO">Nomor Delivery Order</label>
          <div class="input-icon-wrap">
            <span class="icon">🔍</span>
            <input type="text" id="noDO" class="form-control" placeholder="Masukkan nomor DO..." />
          </div>
        </div>
        <button class="btn btn-primary" style="padding:11px 22px" onclick="cariDO()">Cari</button>
      </div>
      <div id="trackingAlert" class="alert" style="margin-top:14px;margin-bottom:0"></div>
    </div>
  </div>

  <!-- Result -->
  <div id="trackingResult" style="display:none">

    <!-- Header Card -->
    <div class="tracking-header-card fade-in-up">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <p style="font-size:12px;opacity:.7;margin-bottom:4px">NOMOR DO</p>
          <h3 id="resNomorDO">–</h3>
        </div>
        <div id="resBadge"></div>
      </div>
      <div style="margin-top:12px">
        <p style="font-size:14px;opacity:.9" id="resNama">–</p>
        <p style="font-size:13px;opacity:.7" id="resEksp">–</p>
      </div>
    </div>

    <!-- Progress Steps -->
    <div class="card fade-in-up delay-1" style="margin-bottom:24px">
      <div class="card-body">
        <p class="card-title" style="margin-bottom:20px">Status Perjalanan</p>
        <div class="progress-steps" id="progressSteps"></div>
      </div>
    </div>

    <!-- Meta Info -->
    <div class="card fade-in-up delay-2" style="margin-bottom:24px">
      <div class="card-body">
        <p class="card-title" style="margin-bottom:16px">Detail Pengiriman</p>
        <dl class="tracking-meta" id="trackingMeta"></dl>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card fade-in-up delay-3">
      <div class="card-body">
        <p class="card-title" style="margin-bottom:20px">📍 Perjalanan Paket</p>
        <ul class="timeline" id="timelineList"></ul>
      </div>
    </div>

  </div>

</main>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  if (!requireAuth()) throw new Error('not auth');
  renderNavbar('tracking');

  document.getElementById('noDO').addEventListener('keydown', e => {
    if (e.key === 'Enter') cariDO();
  });

  function cariDO() {
    const no = document.getElementById('noDO').value.trim();
    hideAlert('trackingAlert');
    document.getElementById('trackingResult').style.display = 'none';

    if (!no) {
      showAlert('trackingAlert', 'Masukkan nomor Delivery Order terlebih dahulu.', 'error');
      return;
    }

    const data = dataTracking[no];
    if (!data) {
      showAlert('trackingAlert', `Nomor DO "<strong>${no}</strong>" tidak ditemukan dalam sistem.`, 'error');
      return;
    }

    renderResult(data);
  }

  function renderResult(data) {
    document.getElementById('resNomorDO').textContent = data.nomorDO;
    document.getElementById('resNama').textContent    = '👤 ' + data.nama;
    document.getElementById('resEksp').textContent    = '🏢 ' + data.ekspedisi + '  •  📅 ' + formatTanggal(data.tanggalKirim);

    // Status Badge
    const statusColors = {
      'Dikirim':           'badge-green',
      'Dalam Perjalanan':  'badge-amber',
      'Diproses':          'badge-blue',
      'Gagal':             'badge-red'
    };
    const badgeClass = statusColors[data.status] || 'badge-blue';
    document.getElementById('resBadge').innerHTML =
      `<span class="badge ${badgeClass}" style="font-size:14px;padding:6px 16px">${data.status}</span>`;

    // Progress Steps
    const steps = ['Diterima', 'Diproses', 'Dikirim', 'Tiba'];
    const statusIndex = data.status === 'Dikirim' ? 3 : data.status === 'Dalam Perjalanan' ? 2 : data.status === 'Diproses' ? 1 : 0;
    const ps = document.getElementById('progressSteps');
    ps.innerHTML = '';
    steps.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'progress-step' + (i < statusIndex ? ' done' : i === statusIndex ? ' active' : '');
      div.innerHTML = `
        <div class="step-circle">${i < statusIndex ? '✓' : i + 1}</div>
        <span class="step-label">${s}</span>
      `;
      ps.appendChild(div);
    });

    // Meta
    const meta = document.getElementById('trackingMeta');
    meta.innerHTML = `
      <div class="meta-item"><dt>Ekspedisi</dt>     <dd>${data.ekspedisi}</dd></div>
      <div class="meta-item"><dt>Tanggal Kirim</dt> <dd>${formatTanggal(data.tanggalKirim)}</dd></div>
      <div class="meta-item"><dt>Jenis Paket</dt>   <dd>${data.paket}</dd></div>
      <div class="meta-item"><dt>Total Pembayaran</dt><dd>${data.total}</dd></div>
      <div class="meta-item"><dt>Penerima</dt>       <dd>${data.nama}</dd></div>
      <div class="meta-item"><dt>Status</dt>         <dd>${data.status}</dd></div>
    `;

    // Timeline
    const tl = document.getElementById('timelineList');
    tl.innerHTML = '';
    const sorted = [...data.perjalanan].reverse();
    sorted.forEach((item, idx) => {
      const li = document.createElement('li');
      const isActive = idx === 0;
      const isDone   = idx !== 0;
      li.className = 'timeline-item ' + (isActive ? 'active' : isDone ? 'done' : '');
      li.innerHTML = `
        <div class="timeline-dot"></div>
        <div class="timeline-time">${formatWaktu(item.waktu)}</div>
        <div class="timeline-desc">${item.keterangan}</div>
      `;
      tl.appendChild(li);
    });

    document.getElementById('trackingResult').style.display = 'block';
    document.getElementById('trackingResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
